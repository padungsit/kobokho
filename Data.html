<div class="glass-card p-4">
  <h4 class="fw-bold mb-4">จัดการข้อมูล กบข.</h4>
  
  <div class="table-responsive">
    <table id="dataTable" class="table table-hover table-striped w-100" style="font-size: 0.9rem;">
      <thead class="table-light">
        <tr>
          <th>วันที่</th>
          <th>ยอดเงินรวม</th>
          <th>เงินต้นรวม</th>
          <th>ผลประโยชน์รวม</th>
          <th>ผลตอบแทน (%)</th>
          <th>กำไรวันนี้</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script>
let dtData = null;

function formatDateThai(dateStr) {
  if (!dateStr) return '-';
  const parts = dateStr.split('-');
  if (parts.length === 3) {
    const year = parseInt(parts[0]) + 543;
    const month = parseInt(parts[1]);
    const day = parseInt(parts[2]);
    return day + '/' + month + '/' + year;
  }
  return dateStr;
}

function initDataTables() {
  showLoader();
  google.script.run.withSuccessHandler(function(res) {
    hideLoader();
    renderDataTables(res);
  }).getSnapshots(currentToken);
}

function renderDataTables(data) {
  if (dtData) dtData.destroy();
  
  dtData = $('#dataTable').DataTable({
    data: data,
    columns: [
      { data: 'Date', render: function(data) { return formatDateThai(data); } },
      { data: 'TotalAmount', render: $.fn.dataTable.render.number(',', '.', 2, '') },
      { data: 'TotalPrincipal', render: $.fn.dataTable.render.number(',', '.', 2, '') },
      { data: 'TotalBenefit', render: $.fn.dataTable.render.number(',', '.', 2, '') },
      { data: 'Yield', render: $.fn.dataTable.render.number(',', '.', 2, '') },
      { 
        data: 'DailyProfit', 
        render: function(data) {
          const val = parseFloat(data) || 0;
          if (val > 0) {
            return '<span class="text-success fw-semibold"><i class="bi bi-arrow-up me-1"></i>+' + val.toLocaleString('th-TH', {minimumFractionDigits: 2}) + '</span>';
          } else if (val < 0) {
            return '<span class="text-danger fw-semibold"><i class="bi bi-arrow-down me-1"></i>' + val.toLocaleString('th-TH', {minimumFractionDigits: 2}) + '</span>';
          }
          return '<span class="text-muted">0.00</span>';
        }
      },
      { 
        data: 'ID', 
        render: function(data) {
          return '<div class="btn-group">' +
                 '<button class="btn btn-sm btn-outline-primary me-1" onclick="editSnapshot(\'' + data + '\')"><i class="bi bi-pencil"></i></button>' +
                 '<button class="btn btn-sm btn-outline-danger" onclick="deleteSnapshot(\'' + data + '\')"><i class="bi bi-trash"></i></button>' +
                 '</div>';
        },
        orderable: false
      }
    ],
    language: {
      url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json'
    },
    dom: 'Bfrtip',
    buttons: ['copy', 'excel', 'print'],
    responsive: true,
    order: [[0, 'desc']]
  });
}

function deleteSnapshot(id) {
  Swal.fire({
    title: 'ยืนยันการลบ?',
    text: "ลบแล้วไม่สามารถกู้คืนได้!",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    cancelButtonColor: '#3085d6',
    confirmButtonText: 'ลบข้อมูล',
    cancelButtonText: 'ยกเลิก',
    fontFamily: 'Noto Sans Thai'
  }).then((result) => {
    if (result.isConfirmed) {
      showLoader();
      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          showAlert('สำเร็จ', 'ลบข้อมูลเรียบร้อย', 'success');
          initDataTables();
        } else {
          hideLoader();
          showAlert('ข้อผิดพลาด', 'ไม่สามารถลบได้', 'error');
        }
      }).deleteSnapshot(currentToken, id);
    }
  });
}

function editSnapshot(id) {
  const rowData = dtData.rows().data().toArray().find(r => r.ID === id);
  if (!rowData) return;
  
  $('#edit-snap-id').val(rowData.ID);
  
  let dateVal = rowData.Date;
  if (dateVal && dateVal.includes('T')) {
    dateVal = dateVal.split('T')[0];
  }
  $('#edit-snap-date').val(dateVal);
  
  $('#edit-snap-mem-prin').val(rowData.MemberPrincipal || 0);
  $('#edit-snap-mem-ben').val(rowData.MemberBenefit || 0);
  $('#edit-snap-gov-prin').val(rowData.GovPrincipal || 0);
  $('#edit-snap-gov-ben').val(rowData.GovBenefit || 0);
  
  calculateEditTotals();
  
  const modal = new bootstrap.Modal(document.getElementById('snapshotModal'));
  modal.show();
}

$(document).off('input', '.edit-calc-trigger').on('input', '.edit-calc-trigger', calculateEditTotals);

function calculateEditTotals() {
  const mPrin = parseFloat($('#edit-snap-mem-prin').val()) || 0;
  const mBen = parseFloat($('#edit-snap-mem-ben').val()) || 0;
  const gPrin = parseFloat($('#edit-snap-gov-prin').val()) || 0;
  const gBen = parseFloat($('#edit-snap-gov-ben').val()) || 0;
  
  const total = mPrin + mBen + gPrin + gBen;
  $('#edit-snap-total').val(total.toFixed(2));
}

function saveEditSnapshot(e) {
  e.preventDefault();
  
  const data = {
    Date: $('#edit-snap-date').val(),
    MemberPrincipal: parseFloat($('#edit-snap-mem-prin').val()) || 0,
    MemberBenefit: parseFloat($('#edit-snap-mem-ben').val()) || 0,
    GovPrincipal: parseFloat($('#edit-snap-gov-prin').val()) || 0,
    GovBenefit: parseFloat($('#edit-snap-gov-ben').val()) || 0
  };
  
  const snapId = $('#edit-snap-id').val();
  
  showLoader();
  google.script.run.withSuccessHandler(function(res) {
    hideLoader();
    if(res.success) {
      const modalEl = document.getElementById('snapshotModal');
      const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      modalInstance.hide();
      
      showAlert('สำเร็จ', 'แก้ไขข้อมูลเรียบร้อยแล้ว', 'success');
      initDataTables();
    } else {
      showAlert('ข้อผิดพลาด', res.message, 'error');
    }
  }).updateSnapshot(currentToken, snapId, data);
}
</script>
