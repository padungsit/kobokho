<div class="glass-card p-4 mx-auto" style="max-width: 800px;">
  <h4 class="fw-bold mb-4">อัปโหลดข้อมูล กบข.</h4>
  
  <div class="row">
    <div class="col-md-5 mb-4">
      <div id="drop-zone" class="border border-2 border-primary border-dashed rounded p-4 text-center position-relative" style="cursor: pointer; border-style: dashed !important; background: rgba(13,110,253,0.05);">
        <i class="bi bi-cloud-arrow-up display-4 text-primary mb-3"></i>
        <h6>คลิกเพื่อเลือกไฟล์ หรือลากไฟล์มาวางที่นี่</h6>
        <p class="text-muted small">รองรับ PNG, JPG, JPEG</p>
        <input type="file" id="fileInput" accept="image/*" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;">
      </div>
      <div id="preview-container" class="mt-3 d-none text-center">
        <img id="image-preview" src="" class="img-fluid rounded shadow-sm" style="max-height: 250px;">
        <div class="mt-2">
          <button class="btn btn-sm btn-outline-danger" onclick="clearImage()">เปลี่ยนรูป</button>
          <button class="btn btn-sm btn-primary" onclick="readOCR()" id="btn-ocr">อ่านข้อมูลจากภาพ</button>
        </div>
      </div>
    </div>
    
    <div class="col-md-7">
      <form id="data-form" onsubmit="saveData(event)">
        <div class="row g-2">
          <div class="col-12 mb-2">
            <label class="form-label small text-muted">วันที่ข้อมูล</label>
            <input type="date" class="form-control form-control-sm" id="inp-date" required>
          </div>
          
          <h6 class="mt-3 mb-2 text-primary border-bottom pb-1">เงินสมาชิก</h6>
          <div class="col-6 mb-2">
            <label class="form-label small text-muted">เงินต้นสมาชิก</label>
            <input type="number" step="0.01" class="form-control form-control-sm calc-trigger" id="inp-mem-prin" required value="0">
          </div>
          <div class="col-6 mb-2">
            <label class="form-label small text-muted">ผลประโยชน์สมาชิก</label>
            <input type="number" step="0.01" class="form-control form-control-sm calc-trigger" id="inp-mem-ben" required value="0">
          </div>
          <div class="col-12 mb-2">
            <label class="form-label small text-muted">รวมเงินสมาชิก</label>
            <input type="number" step="0.01" class="form-control form-control-sm bg-light" id="inp-mem-total" readonly>
          </div>
          
          <h6 class="mt-3 mb-2 text-primary border-bottom pb-1">เงินภาครัฐ</h6>
          <div class="col-6 mb-2">
            <label class="form-label small text-muted">เงินต้นภาครัฐ</label>
            <input type="number" step="0.01" class="form-control form-control-sm calc-trigger" id="inp-gov-prin" required value="0">
          </div>
          <div class="col-6 mb-2">
            <label class="form-label small text-muted">ผลประโยชน์ภาครัฐ</label>
            <input type="number" step="0.01" class="form-control form-control-sm calc-trigger" id="inp-gov-ben" required value="0">
          </div>
          <div class="col-12 mb-2">
            <label class="form-label small text-muted">รวมเงินภาครัฐ</label>
            <input type="number" step="0.01" class="form-control form-control-sm bg-light" id="inp-gov-total" readonly>
          </div>
          
          <h6 class="mt-3 mb-2 text-success border-bottom pb-1">สรุปยอดรวมทั้งหมด</h6>
          <div class="col-12 mb-3">
            <input type="number" step="0.01" class="form-control fw-bold text-success fs-5 bg-light" id="inp-total" readonly>
          </div>
          
          <input type="hidden" id="inp-ocr-text">
        </div>
        
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="reset" class="btn btn-light" onclick="clearForm()">ยกเลิก</button>
          <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-1"></i> บันทึกข้อมูล</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
var currentBase64 = null;
$(document).on('dragover', '#view-container #drop-zone', function(e) { e.preventDefault(); $(this).addClass('bg-light'); });
$(document).on('dragleave', '#view-container #drop-zone', function(e) { e.preventDefault(); $(this).removeClass('bg-light'); });
$(document).on('drop', '#view-container #drop-zone', function(e) {
  e.preventDefault();
  $(this).removeClass('bg-light');
  if(e.originalEvent.dataTransfer.files.length) {
    handleFile(e.originalEvent.dataTransfer.files[0]);
  }
});
$(document).on('change', '#view-container #fileInput', function() {
  if(this.files.length) handleFile(this.files[0]);
});

function handleFile(file) {
  if(!file.type.match('image.*')) return showAlert('ข้อผิดพลาด', 'กรุณาเลือกไฟล์รูปภาพเท่านั้น', 'error');
  
  $('#view-container #drop-zone').addClass('d-none');
  $('#view-container #preview-container').removeClass('d-none');
  
  const reader = new FileReader();
  reader.onload = (e) => {
    currentBase64 = e.target.result;
    $('#view-container #image-preview').attr('src', currentBase64);
    
    const img = new Image();
    img.onload = () => {
      try {
        const canvas = document.createElement('canvas');
        const MAX_WIDTH = 1200;
        const MAX_HEIGHT = 1200;
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
        } else {
          if (height > MAX_HEIGHT) {
            width *= MAX_HEIGHT / height;
            height = MAX_HEIGHT;
          }
        }
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        
        currentBase64 = canvas.toDataURL('image/jpeg', 0.7); 
        $('#view-container #image-preview').attr('src', currentBase64);
      } catch(err) {
        console.error('Compression error:', err);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearImage() {
  currentBase64 = null;
  $('#view-container #fileInput').val('');
  $('#view-container #drop-zone').removeClass('d-none');
  $('#view-container #preview-container').addClass('d-none');
}

function readOCR() {
  if(!currentBase64) return;
  
  Swal.fire({
    title: 'กำลังอ่านข้อมูลจากภาพ',
    html: 'กรุณารอสักครู่ประมาณ 5-10 วินาที ระบบกำลังประมวลผล OCR...',
    allowOutsideClick: false,
    showConfirmButton: false,
    didOpen: () => {
      Swal.showLoading();
    }
  });
  
  google.script.run.withSuccessHandler(function(res) {
    Swal.close();
    if(res.success) {
      $('#view-container #inp-ocr-text').val(res.text);
      $('#view-container #inp-date').val(res.parsed.Date);
      
      // Populate fields
      $('#view-container #inp-mem-prin').val(res.parsed.MemberPrincipal);
      $('#view-container #inp-mem-ben').val(res.parsed.MemberBenefit);
      $('#view-container #inp-gov-prin').val(res.parsed.GovPrincipal);
      $('#view-container #inp-gov-ben').val(res.parsed.GovBenefit);
      
      showAlert('สำเร็จ', 'อ่านข้อมูลเสร็จสิ้น กรุณาตรวจสอบตัวเลขอีกครั้ง', 'success');
      calculateTotals();
    } else {
      showAlert('ข้อผิดพลาด OCR', res.message, 'error');
    }
  }).withFailureHandler(function(err) {
    Swal.close();
    showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถติดต่อเซิร์ฟเวอร์ได้ รูปอาจใหญ่เกินไป', 'error');
  }).parseOCR(currentBase64);
}

$('.calc-trigger').on('input', calculateTotals);

function calculateTotals() {
  const mPrin = parseFloat($('#inp-mem-prin').val()) || 0;
  const mBen = parseFloat($('#inp-mem-ben').val()) || 0;
  const gPrin = parseFloat($('#inp-gov-prin').val()) || 0;
  const gBen = parseFloat($('#inp-gov-ben').val()) || 0;
  
  const mTotal = mPrin + mBen;
  const gTotal = gPrin + gBen;
  const total = mTotal + gTotal;
  
  $('#inp-mem-total').val(mTotal.toFixed(2));
  $('#inp-gov-total').val(gTotal.toFixed(2));
  $('#inp-total').val(total.toFixed(2));
}

function clearForm() {
  clearImage();
  $('#data-form')[0].reset();
  calculateTotals();
}

function saveData(e) {
  e.preventDefault();
  
  const data = {
    Date: $('#inp-date').val(),
    MemberPrincipal: parseFloat($('#inp-mem-prin').val()) || 0,
    MemberBenefit: parseFloat($('#inp-mem-ben').val()) || 0,
    MemberAmount: parseFloat($('#inp-mem-total').val()) || 0,
    GovPrincipal: parseFloat($('#inp-gov-prin').val()) || 0,
    GovBenefit: parseFloat($('#inp-gov-ben').val()) || 0,
    GovAmount: parseFloat($('#inp-gov-total').val()) || 0,
    TotalAmount: parseFloat($('#inp-total').val()) || 0,
    OCRText: $('#inp-ocr-text').val()
  };
  
  showLoader();
  google.script.run.withSuccessHandler(function(res) {
    hideLoader();
    if(res.success) {
      showAlert('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success').then(() => {
        clearForm();
        window.location.hash = '#dashboard';
      });
    } else {
      showAlert('ข้อผิดพลาด', res.message, 'error');
    }
  }).withFailureHandler(function(err) {
    hideLoader();
    showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถบันทึกข้อมูลได้', 'error');
  }).saveSnapshot(currentToken, data);
}
</script>
