<div class="glass-card p-4 mx-auto" style="max-width: 600px;">
  <h4 class="fw-bold mb-4"><i class="bi bi-gear text-primary me-2"></i> ตั้งค่าระบบ</h4>
  
  <form id="setting-form" onsubmit="saveSettingsForm(event)">
    <div class="mb-4">
      <label class="form-label fw-semibold">ชื่อระบบ</label>
      <input type="text" class="form-control" id="s-sysname">
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">OCR.Space API Key</label>
      <input type="text" class="form-control" id="s-ocr">
      <div class="form-text small">รับ API Key ได้ฟรีที่ ocr.space</div>
    </div>
    
    <div class="d-grid mt-4">
      <button type="submit" class="btn btn-primary py-2"><i class="bi bi-save me-1"></i> บันทึกการตั้งค่า</button>
    </div>
  </form>
</div>

<script>
function initSettings() {
  showLoader();
  google.script.run.withSuccessHandler(function(res) {
    hideLoader();
    res.forEach(item => {
      if(item.Key === 'SYSTEM_NAME') $('#s-sysname').val(item.Value);
      if(item.Key === 'OCR_API_KEY') $('#s-ocr').val(item.Value);
    });
  }).getSettings(currentToken);
}

function saveSettingsForm(e) {
  e.preventDefault();
  showLoader();
  
  const sName = $('#s-sysname').val();
  const sOcr = $('#s-ocr').val();
  
  google.script.run.withSuccessHandler(function() {
    google.script.run.withSuccessHandler(function() {
      hideLoader();
      showAlert('สำเร็จ', 'บันทึกการตั้งค่าเรียบร้อย', 'success');
    }).saveSetting(currentToken, 'OCR_API_KEY', sOcr);
  }).saveSetting(currentToken, 'SYSTEM_NAME', sName);
}
</script>
