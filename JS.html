<script>
  // Polyfill google.script.run for running outside Google Apps Script (e.g. GitHub Pages)
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxZWGtVxFIzjirwyDmhroiyab7L_WMkCX1RqwsPARM9DN_awyaWiFGEpH2FKPzfo4H4/exec";
    
    function createRunProxy(successCb, failureCb) {
      return new Proxy({}, {
        get: function(target, propKey) {
          if (propKey === 'withSuccessHandler') {
            return function(cb) { return createRunProxy(cb, failureCb); };
          }
          if (propKey === 'withFailureHandler') {
            return function(cb) { return createRunProxy(successCb, cb); };
          }
          
          return function(...args) {
            fetch(GAS_WEB_APP_URL, {
              method: 'POST',
              headers: {
                'Content-Type': 'text/plain;charset=utf-8'
              },
              body: JSON.stringify({
                functionName: propKey,
                arguments: args
              })
            })
            .then(res => {
              if (!res.ok) throw new Error('HTTP ' + res.status);
              return res.json();
            })
            .then(result => {
              if (result.success) {
                if (successCb) successCb(result.data);
              } else {
                if (failureCb) {
                  failureCb(new Error(result.error));
                } else {
                  console.error('API Error:', result.error);
                }
              }
            })
            .catch(err => {
              if (failureCb) failureCb(err);
              else console.error('Network Error:', err);
            });
          };
        }
      });
    }

    window.google = {
      script: {
        run: createRunProxy(null, null)
      }
    };
  }

  let currentUser = null;
  let currentToken = localStorage.getItem('gpf_token');
  
  $(document).ready(function() {
    if (currentToken) {
      showLoader();
      google.script.run.withSuccessHandler(function(res) {
        if (res.success) {
          currentUser = res.user;
          initApp();
        } else {
          showLogin();
        }
        hideLoader();
      }).checkAuth(currentToken);
    } else {
      showLogin();
    }
  });
  
  function initApp() {
    $('#login-container').hide();
    $('#app').fadeIn();
    $('.user-name-display').text(currentUser.Name || currentUser.Username);
    
    // Set custom avatar based on Role (Cartoon with role background color)
    let avatarBg = '0d6efd'; // Blue for User
    if (currentUser.Role === 'SuperAdmin') {
      avatarBg = 'dc3545'; // Red for SuperAdmin
    } else if (currentUser.Role === 'Admin') {
      avatarBg = 'fd7e14'; // Orange/Yellow for Admin
    }
    // Using Dicebear API to generate a cute cartoon character (Lorelei style - Kawaii/Gen Alpha)
    let avatarUrl = 'https://api.dicebear.com/7.x/lorelei/svg?seed=' + encodeURIComponent(currentUser.Username) + '&backgroundColor=' + avatarBg;
    $('.navbar-avatar').attr('src', avatarUrl);
    
    // Role-based UI elements visibility toggling
    $('.user-only, .admin-only, .superadmin-only').hide();
    if (currentUser.Role === 'User') {
      $('.user-only').show();
    } else if (currentUser.Role === 'Admin') {
      $('.admin-only').show();
    } else if (currentUser.Role === 'SuperAdmin') {
      $('.admin-only').show();
      $('.superadmin-only').show();
    }
    
    $(window).on('hashchange', handleRoute);
    if (!window.location.hash) {
      window.location.hash = '#dashboard';
    } else {
      handleRoute();
    }
  }
  
  function handleRoute() {
    let hash = window.location.hash || '#dashboard';
    const viewId = hash.replace('#', '');
    const template = $('#tpl-' + viewId).html();
    
    if (template) {
      $('#view-container').html(template).removeClass('animate__animated animate__fadeIn').addClass('animate__animated animate__fadeIn');
      
      $('.nav-link').removeClass('active');
      $('a[href="' + hash + '"]').addClass('active');
      
      if (viewId === 'dashboard') initDashboard();
      if (viewId === 'data') initDataTables();
      if (viewId === 'member') initMemberTable();
      if (viewId === 'setting') initSettings();
    }
  }
  
  function showLoader() { $('#global-loader').removeClass('d-none').addClass('d-flex'); }
  function hideLoader() { $('#global-loader').removeClass('d-flex').addClass('d-none'); }
  
  function showAlert(title, text, icon) {
    return Swal.fire({
      title: title,
      text: text,
      icon: icon,
      confirmButtonText: 'ตกลง',
      confirmButtonColor: '#0d6efd',
      fontFamily: 'Noto Sans Thai'
    });
  }
  
  function doLogin(e) {
    e.preventDefault();
    const user = $('#username').val();
    const pass = $('#password').val();
    
    showLoader();
    google.script.run.withSuccessHandler(function(res) {
      hideLoader();
      if (res.success) {
        currentToken = res.token;
        localStorage.setItem('gpf_token', currentToken);
        currentUser = res.user;
        initApp();
      } else {
        showAlert('ข้อผิดพลาด', res.message, 'error');
      }
    }).login(user, pass);
  }
  
  function doLogout() {
    Swal.fire({
      title: 'ยืนยันการออกจากระบบ?',
      icon: 'warning',
      showCancelButton: true,
      confirmButtonText: 'ออกจากระบบ',
      cancelButtonText: 'ยกเลิก',
      confirmButtonColor: '#dc3545'
    }).then((result) => {
      if (result.isConfirmed) {
        showLoader();
        google.script.run.withSuccessHandler(function() {
          localStorage.removeItem('gpf_token');
          currentToken = null;
          currentUser = null;
          showLogin();
        }).logout(currentToken);
      }
    });
  }
  
  function showLogin(e) {
    if(e) e.preventDefault();
    $('#app').hide();
    $('#register-container').hide();
    $('#login-container').fadeIn();
    $('#username').val('');
    $('#password').val('');
    hideLoader();
  }
  
  function showRegister(e) {
    if(e) e.preventDefault();
    $('#app').hide();
    $('#login-container').hide();
    $('#register-container').fadeIn();
  }
  
  function doRegister(e) {
    e.preventDefault();
    const name = $('#reg-name').val();
    const user = $('#reg-username').val();
    const pass = $('#reg-password').val();
    
    showLoader();
    google.script.run.withSuccessHandler(function(res) {
      hideLoader();
      if (res.success) {
        showAlert('สำเร็จ', 'ลงทะเบียนสำเร็จ กรุณารอเพื่อให้ผู้ดูแลระบบกำหนดสิทธิ์เข้าระบบ', 'success').then(() => {
          showLogin();
        });
      } else {
        showAlert('ข้อผิดพลาด', res.message, 'error');
      }
    }).registerUser({Name: name, Username: user, Password: pass});
  }

  function showChangePasswordModal() {
    $('#change-pwd-form')[0].reset();
    const modalEl = document.getElementById('changePasswordModal');
    const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
    modalInstance.show();
  }

  function doChangePassword(e) {
    e.preventDefault();
    const oldPwd = $('#pwd-old').val();
    const newPwd = $('#pwd-new').val();
    const confirmPwd = $('#pwd-confirm').val();

    if (newPwd !== confirmPwd) {
      return showAlert('ข้อผิดพลาด', 'รหัสผ่านใหม่และการยืนยันรหัสผ่านไม่ตรงกัน', 'error');
    }

    showLoader();
    google.script.run.withSuccessHandler(function(res) {
      hideLoader();
      if (res.success) {
        const modalEl = document.getElementById('changePasswordModal');
        const modalInstance = bootstrap.Modal.getInstance(modalEl);
        if (modalInstance) modalInstance.hide();

        showAlert('สำเร็จ', res.message || 'เปลี่ยนรหัสผ่านสำเร็จเรียบร้อยแล้ว', 'success');
      } else {
        showAlert('ข้อผิดพลาด', res.message, 'error');
      }
    }).withFailureHandler(function(err) {
      hideLoader();
      showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถเปลี่ยนรหัสผ่านได้', 'error');
    }).changeMyPassword(currentToken, oldPwd, newPwd);
  }
</script>
