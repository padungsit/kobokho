<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background: linear-gradient(135deg, #f4f6f9 0%, #e0e5ec 100%);">
  <div class="glass-card p-5" style="max-width: 450px; width: 100%;">
    <div class="text-center mb-4">
      <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px;">
        <i class="bi bi-person-plus fs-1"></i>
      </div>
      <h3 class="fw-bold text-dark">ลงทะเบียนสมาชิก</h3>
      <p class="text-muted">ระบบติดตามกำไร กบข.</p>
    </div>
    <form onsubmit="doRegister(event)">
      <div class="mb-3">
        <label class="form-label">ชื่อ-นามสกุล</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person-badge"></i></span>
          <input type="text" class="form-control" id="reg-name" required placeholder="กรอกชื่อ-นามสกุล">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">ชื่อผู้ใช้งาน (Username)</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control" id="reg-username" required placeholder="กรอกชื่อผู้ใช้สำหรับเข้าระบบ">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text bg-white"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control" id="reg-password" required placeholder="กรอกรหัสผ่าน">
        </div>
      </div>
      <button type="submit" class="btn btn-success w-100 py-2 fw-semibold shadow-sm mb-3">ลงทะเบียน</button>
      <div class="text-center">
        <a href="#" class="text-decoration-none small" onclick="showLogin(event)">มีบัญชีอยู่แล้ว? เข้าสู่ระบบ</a>
      </div>
    </form>
  </div>
</div>
