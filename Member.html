<div class="glass-card p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="fw-bold mb-0">จัดการสมาชิก</h4>
    <button class="btn btn-primary btn-sm" onclick="showMemberModal()"><i class="bi bi-person-plus me-1"></i> เพิ่มสมาชิก</button>
  </div>
  
  <div class="table-responsive">
    <table id="memberTable" class="table table-hover table-striped w-100" style="font-size: 0.9rem;">
      <thead class="table-light">
        <tr>
          <th>Username</th>
          <th>ชื่อ-นามสกุล</th>
          <th>สิทธิ์</th>
          <th>สถานะ</th>
          <th>เข้าใช้งานล่าสุด</th>
          <th>จัดการ</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>



<script>
let dtMember = null;
let mModal = null;
var localMembers = [];

function initMemberTable() {
  showLoader();
  google.script.run.withSuccessHandler(function(res) {
    hideLoader();
    localMembers = res || [];
    renderMemberTable(localMembers);
  }).withFailureHandler(function(err) {
    hideLoader();
    showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถโหลดรายชื่อสมาชิกได้', 'error');
  }).getUsers(currentToken);
}

function renderMemberTable(data) {
  if (dtMember) dtMember.destroy();
  
  dtMember = $('#memberTable').DataTable({
    data: data,
    columns: [
      { data: 'Username' },
      { data: 'Name' },
      { 
        data: 'Role',
        render: function(d) {
          if(d==='SuperAdmin') return '<span class="badge bg-danger">สูงสุด</span>';
          if(d==='Admin') return '<span class="badge bg-warning text-dark">ผู้ดูแล</span>';
          return '<span class="badge bg-secondary">สมาชิก</span>';
        }
      },
      { 
        data: 'Status',
        render: function(d) {
          return d === 'Active' ? '<span class="badge bg-success">ปกติ</span>' : '<span class="badge bg-secondary">ระงับ</span>';
        }
      },
      { 
        data: 'LastLogin',
        render: function(d) {
          return d ? new Date(d).toLocaleString('th-TH') : '-';
        }
      },
      { 
        data: null,
        render: function(row) {
          const btnEdit = '<button class="btn btn-sm btn-outline-primary me-1" onclick="editMember(\'' + row.UserID + '\')"><i class="bi bi-pencil"></i></button>';
          const btnDel = row.Username === 'admin' ? '' : '<button class="btn btn-sm btn-outline-danger" onclick="deleteMember(\'' + row.UserID + '\')"><i class="bi bi-trash"></i></button>';
          return btnEdit + btnDel;
        },
        orderable: false
      }
    ],
    language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/th.json' },
    responsive: true
  });
}

function showMemberModal() {
  $('#member-form')[0].reset();
  $('#m-id').val('');
  $('#m-username').prop('readonly', false);
  
  const modalEl = document.getElementById('memberModal');
  const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
  modalInstance.show();
}

function editMember(userId) {
  const row = localMembers.find(m => m.UserID === userId);
  if (!row) return;
  
  $('#m-id').val(row.UserID);
  $('#m-username').val(row.Username).prop('readonly', true);
  $('#m-password').val('');
  $('#m-name').val(row.Name);
  $('#m-role').val(row.Role);
  $('#m-status').val(row.Status);
  
  const modalEl = document.getElementById('memberModal');
  const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
  modalInstance.show();
}

function saveMember(e) {
  e.preventDefault();
  
  try {
    const data = {
      UserID: $('#m-id').val(),
      Username: $('#m-username').val(),
      Password: $('#m-password').val(),
      Name: $('#m-name').val(),
      Role: $('#m-role').val(),
      Status: $('#m-status').val(),
      Department: '-',
      Position: '-'
    };
    
    const modalEl = document.getElementById('memberModal');
    if(modalEl) {
      const modalInstance = bootstrap.Modal.getInstance(modalEl) || new bootstrap.Modal(modalEl);
      if(modalInstance) modalInstance.hide();
    }
    
    showLoader();
    google.script.run.withSuccessHandler(function(res) {
      if(res.success) {
        showAlert('สำเร็จ', 'บันทึกข้อมูลสำเร็จ', 'success');
        initMemberTable();
      } else {
        hideLoader();
        showAlert('ข้อผิดพลาด', res.message, 'error');
      }
    }).withFailureHandler(function(err) {
      hideLoader();
      showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถบันทึกข้อมูลสมาชิกได้', 'error');
    }).saveUser(currentToken, data);
  } catch(err) {
    hideLoader();
    showAlert('ข้อผิดพลาดสคริปต์', err.message, 'error');
  }
}

function deleteMember(id) {
  Swal.fire({
    title: 'ลบสมาชิก?',
    text: "ลบแล้วไม่สามารถกู้คืนได้!",
    icon: 'warning',
    showCancelButton: true,
    confirmButtonColor: '#d33',
    confirmButtonText: 'ลบข้อมูล'
  }).then((result) => {
    if (result.isConfirmed) {
      showLoader();
      google.script.run.withSuccessHandler(function(res) {
        if(res.success) {
          showAlert('สำเร็จ', 'ลบข้อมูลเรียบร้อย', 'success');
          initMemberTable();
        } else {
          hideLoader();
          showAlert('ข้อผิดพลาด', 'ไม่สามารถลบได้', 'error');
        }
      }).withFailureHandler(function(err) {
        hideLoader();
        showAlert('ข้อผิดพลาดระบบ', err.message || 'ไม่สามารถลบสมาชิกได้', 'error');
      }).deleteUser(currentToken, id);
    }
  });
}
</script>
